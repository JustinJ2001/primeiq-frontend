<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign In — PrimeIQ</title>
<meta name="description" content="Sign in to your PrimeIQ restaurant analytics dashboard.">
<meta name="theme-color" content="#1a1208">
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📊</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=IBM+Plex+Mono:wght@300;400;500&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:"Lato",sans-serif;background:#1a1208;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;}
.logo{font-family:"Playfair Display",serif;font-size:22px;color:#e8b84b;text-align:center;margin-bottom:6px;}
.logo em{font-style:italic;color:#f5ead6;}
.logo-sub{font-family:"IBM Plex Mono",monospace;font-size:8px;color:rgba(255,255,255,0.25);letter-spacing:0.2em;text-transform:uppercase;text-align:center;margin-bottom:36px;}
.card{background:#fff;border-radius:14px;padding:36px;width:100%;max-width:400px;}
.card-title{font-family:"Playfair Display",serif;font-size:22px;color:#1a1208;margin-bottom:4px;}
.card-sub{font-family:"IBM Plex Mono",monospace;font-size:9px;color:#8a7a5a;margin-bottom:24px;letter-spacing:0.06em;}
.f-group{margin-bottom:14px;}
.f-label{font-family:"IBM Plex Mono",monospace;font-size:9px;letter-spacing:0.1em;text-transform:uppercase;color:#8a7a5a;display:block;margin-bottom:5px;}
.f-input{width:100%;padding:11px 13px;border:1.5px solid rgba(40,25,5,0.12);border-radius:8px;font-family:"Lato",sans-serif;font-size:14px;color:#1a1208;outline:none;transition:border-color 0.15s;}
.f-input:focus{border-color:#b8860b;}
.btn{width:100%;padding:13px;border-radius:8px;border:none;background:#b8860b;color:#fff;font-family:"IBM Plex Mono",monospace;font-size:11px;letter-spacing:0.1em;text-transform:uppercase;cursor:pointer;font-weight:500;margin-top:6px;}
.btn:disabled{opacity:0.5;cursor:not-allowed;}
.alert{border-radius:8px;padding:10px 14px;margin-bottom:14px;font-size:12.5px;display:none;}
.alert.show{display:block;}
.alert.error{background:#fdf0ee;border:1px solid rgba(192,57,43,0.2);color:#c0392b;}
.alert.success{background:#edf7f2;border:1px solid rgba(45,122,79,0.2);color:#2d7a4f;}
.forgot{font-family:"IBM Plex Mono",monospace;font-size:9px;color:#b8860b;cursor:pointer;text-align:right;display:block;margin-top:6px;text-decoration:none;}
.divider{text-align:center;font-family:"IBM Plex Mono",monospace;font-size:9px;color:#8a7a5a;margin:18px 0;letter-spacing:0.1em;}
.signup-link{text-align:center;font-family:"IBM Plex Mono",monospace;font-size:9px;color:#8a7a5a;margin-top:18px;}
.signup-link a{color:#b8860b;}
.spinner{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,0.4);border-top-color:#fff;border-radius:50%;animation:spin 0.7s linear infinite;vertical-align:middle;margin-right:6px;}
@keyframes spin{to{transform:rotate(360deg);}}

/* ── CONTRAST OVERRIDES ── */
.f-label { font-size: 11px !important; color: rgba(255,255,255,0.72) !important; }
.f-input { font-size: 15px !important; }
.card-title { font-size: 22px !important; }
.card-sub { font-size: 14px !important; color: rgba(255,255,255,0.62) !important; }
.forgot { font-size: 11px !important; color: rgba(255,255,255,0.55) !important; }
.logo-sub { font-size: 9px !important; color: rgba(255,255,255,0.35) !important; }

</style>
<script>
// Lightweight frontend error tracking — sends to API
window.addEventListener('error', function(e) {
  try {
    var clientId = (function(k){ try{ var v=localStorage.getItem(k); return(!v||v==='undefined'||v==='null')?null:v; }catch(ex){return null;} })('rd_client_id');
    fetch('https://restaurant-api-68re.onrender.com/api/usage/ping', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        client_id: clientId || 'anonymous',
        page: 'error:' + window.location.pathname,
        error: (e.message || '').slice(0, 200),
        file: (e.filename || '').slice(0, 100),
        line: e.lineno
      })
    }).catch(function(){});
  } catch(ex) {}
});
</script>
</head>
<body>
<div style="position:absolute;top:16px;left:20px;"><a href="/" style="font-family:'IBM Plex Mono',monospace;font-size:10px;color:rgba(255,255,255,0.4);text-decoration:none;">← Home</a></div>
<div class="logo"><em>Prime</em>IQ</div>
<div class="logo-sub">Restaurant Analytics</div>
<div class="card">
  <div class="card-title">Sign in</div>
  <div class="card-sub">Access your restaurant dashboard</div>
  <div id="alert" class="alert"></div>
  <div id="reset_panel" style="display:none">
    <div class="f-group"><label class="f-label">Your Email</label>
      <input class="f-input" id="reset_email" type="email" placeholder="owner@yourrestaurant.com"></div>
    <button class="btn" id="reset_btn" onclick="sendReset()">Send Reset Link</button>
    <div class="divider">OR</div>
    <div style="text-align:center"><span class="forgot" onclick="showLogin()">Back to sign in</span></div>
  </div>
  <div id="login_panel">
    <div class="f-group"><label class="f-label">Email</label>
      <input class="f-input" id="email" type="email" name="email" autocomplete="email" placeholder="owner@yourrestaurant.com" onkeydown="if(event.key==='Enter')signIn()"></div>
    <div class="f-group"><label class="f-label">Password</label>
      <div style="position:relative">
        <input class="f-input" id="password" type="password" name="password" autocomplete="current-password" placeholder="Your password" onkeydown="if(event.key==='Enter')signIn()" style="padding-right:40px">
        <button type="button" onclick="var i=document.getElementById('password');i.type=i.type==='password'?'text':'password';this.textContent=i.type==='password'?'👁':'🙈'" style="position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:14px">👁</button>
      </div></div>
    <a class="forgot" onclick="showReset()">Forgot password?</a>
    <button class="btn" id="login_btn" onclick="signIn()">Sign In →</button>
    <button onclick="window.location.href='/dashboard?demo=1'" style="width:100%;padding:12px;margin-top:10px;border:1.5px solid var(--border);border-radius:8px;background:transparent;font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--muted);cursor:pointer;letter-spacing:0.06em">View Demo Dashboard →</button>
  </div>
  <div class="signup-link">Don't have an account? <a href="/onboarding">Get started</a></div>
</div>

<script>
const SUPABASE_URL = 'https://rkxhrdecrqtqoorjyfel.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJreGhyZGVjcnF0cW9vcmp5ZmVsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkxNTU1OTIsImV4cCI6MjA5NDczMTU5Mn0.yGHgPoXlHPb3i_qUpsicob7nd8rdZvtSCnqnDamosBw';

function showAlert(msg, type) {
  const el = document.getElementById('alert');
  el.textContent = msg; el.className = 'alert show ' + type;
}

function setLoading(id, on) {
  const btn = document.getElementById(id);
  if (on) { btn._orig = btn.innerHTML; btn.disabled = true; btn.innerHTML = '<span class="spinner"></span>Please wait...'; }
  else { btn.disabled = false; btn.innerHTML = btn._orig; }
}

function showReset() {
  document.getElementById('login_panel').style.display = 'none';
  document.getElementById('reset_panel').style.display = 'block';
}

function showLogin() {
  document.getElementById('login_panel').style.display = 'block';
  document.getElementById('reset_panel').style.display = 'none';
}

async function signIn() {
  // Rate limit
  var now = Date.now();
  if (window._lastSignIn && now - window._lastSignIn < 2000) return;
  window._lastSignIn = now;
  const email    = document.getElementById('email').value.trim().toLowerCase();
  const password = document.getElementById('password').value;
  if (!email || !password) return showAlert('Please enter your email and password.', 'error');
  setLoading('login_btn', true);
  try {
    const res = await fetch(SUPABASE_URL + '/auth/v1/token?grant_type=password', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'apikey': SUPABASE_KEY },
      body: JSON.stringify({ email, password })
    });
    const data = await res.json();
    if (data.error || !data.access_token || !data.user) {
      throw new Error(data.error_description || data.error || 'Incorrect email or password. Please try again.');
    }
    // Check subscription status
    const clientRes = await fetch(SUPABASE_URL + '/rest/v1/clients?user_id=eq.' + data.user.id + '&select=status', {
      headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + data.access_token }
    });
    const clients = await clientRes.json();
    const status = clients[0]?.status;
    if (status === 'cancelled' || status === 'suspended') {
      showAlert('Your subscription is not active. Please update your payment method.', 'error');
      setLoading('login_btn', false);
      return;
    }
    // Store token and redirect
    try{localStorage.setItem('rd_token', data.access_token);}catch(e){}
    try{localStorage.setItem('rd_refresh', data.refresh_token);}catch(e){}
    // Fetch client ID and store it
    try {
      const clientRes = await fetch('https://restaurant-api-68re.onrender.com/api/settings', {
        headers: { 'Authorization': 'Bearer ' + data.access_token }
      });
      const clientData = await clientRes.json();
      if (clientData.client?.id) try{localStorage.setItem('rd_client_id', clientData.client.id);}catch(e){}
    } catch(e) {}
    // Check if onboarding is complete
    var clientId = localStorage.getItem('rd_client_id');
    if (clientId) {
      try {
        var checkRes = await fetch('https://restaurant-api-68re.onrender.com/api/clients/' + clientId, {
          headers: { 'Authorization': 'Bearer ' + data.access_token }
        });
        var checkData = await checkRes.json();
        if (checkData.setup_complete === false) {
          try{localStorage.setItem('rd_onboarding', 'true');}catch(e){}
          window.location.href = '/onboarding';
          return;
        }
      } catch(e) {}
    }
    try{localStorage.setItem('rd_setup_complete', 'true');}catch(e){}
    window.location.href = '/dashboard';
  } catch(e) {
    if (e.message && e.message.includes('fetch')) {
      showAlert('Connection error. Please check your internet and try again.', 'error');
    } else {
      showAlert(e.message || 'Sign in failed. Please try again.', 'error');
    }
  }
  setLoading('login_btn', false);
}

async function sendReset() {
  const email = document.getElementById('reset_email').value.trim().toLowerCase();
  if (!email) return showAlert('Please enter your email address.', 'error');
  if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) return showAlert('Please enter a valid email address.', 'error');
  setLoading('reset_btn', true);
  try {
    var res = await fetch(SUPABASE_URL + '/auth/v1/recover', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'apikey': SUPABASE_KEY },
      body: JSON.stringify({ email: email, gotrue_meta_security: {} })
    });
    // Supabase returns 200 regardless of whether email exists (security best practice)
    showAlert('If an account exists for ' + email + ', a reset link has been sent. Check your inbox and spam folder.', 'success');
  } catch(e) {
    if (e.message && e.message.includes('fetch')) {
      showAlert('Connection error. Please try again.', 'error');
    } else {
      showAlert('Could not send reset email. Please contact justin@primeiq.io for help.', 'error');
    }
  }
  setLoading('reset_btn', false);
}

// Auto redirect if already signed in with valid session
(async function(){
  try {
    var t = localStorage.getItem('rd_token');
    var clientId = localStorage.getItem('rd_client_id');
    var done = localStorage.getItem('rd_setup_complete');
    if (!t || !clientId) return;
    // Verify Supabase token is still valid
    var r = await fetch('https://rkxhrdecrqtqoorjyfel.supabase.co/auth/v1/user', {
      headers: { 'Authorization': 'Bearer ' + t, 'apikey': 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJreGhyZGVjcnF0cW9vcmp5ZmVsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkxNTU1OTIsImV4cCI6MjA5NDczMTU5Mn0.yGHgPoXlHPb3i_qUpsicob7nd8rdZvtSCnqnDamosBw' }
    });
    if (r.status !== 200) {
      // Token invalid — clear and stay on login
      localStorage.removeItem('rd_token');
      localStorage.removeItem('rd_client_id');
      localStorage.removeItem('rd_setup_complete');
      return;
    }
    // Verify client record still exists in our DB
    var cr = await fetch('https://restaurant-api-68re.onrender.com/api/clients/' + clientId, {
      headers: { 'Authorization': 'Bearer ' + t }
    });
    if (cr.status === 404 || cr.status === 403) {
      // Account deleted or access denied — clear all keys and stay on login
      ['rd_token','rd_client_id','rd_refresh','rd_setup_complete','rd_onboarding','rd_pilot','rd_last_period'].forEach(function(k){ localStorage.removeItem(k); });
      return;
    }
    if (!cr.ok) return; // API error — stay on login, don't redirect
    // All good — redirect
    if (done === 'true') window.location.href = '/dashboard';
    else window.location.href = '/onboarding';
  } catch(e) {}
})();
</script>
</body>
</html>
