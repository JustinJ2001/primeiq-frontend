<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — PrimeIQ</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=IBM+Plex+Mono:wght@300;400;500&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#faf8f4;--card:#fff;--border:rgba(40,25,5,0.1);--gold:#b8860b;--dark:#1a1208;--muted:#8a7a5a;--green:#2d7a4f;--green-bg:#edf7f2;--red:#c0392b;--red-bg:#fdf0ee;--amber:#c07000;--amber-bg:#fef6e8;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Lato',sans-serif;background:var(--bg);color:var(--dark);min-height:100vh;}
.header{background:var(--dark);padding:16px 32px;display:flex;align-items:center;justify-content:space-between;}
.logo{font-family:'Playfair Display',serif;font-size:18px;color:#e8b84b;}
.logo em{font-style:italic;}
.badge{font-family:'IBM Plex Mono',monospace;font-size:8px;background:var(--gold);color:#fff;padding:2px 8px;border-radius:4px;letter-spacing:0.1em;margin-left:10px;}
.main{max-width:1000px;margin:0 auto;padding:32px 20px 80px;}
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:28px;}
.stat{background:var(--card);border:1.5px solid var(--border);border-radius:10px;padding:16px;}
.stat-label{font-family:'IBM Plex Mono',monospace;font-size:8.5px;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);margin-bottom:6px;}
.stat-val{font-family:'Playfair Display',serif;font-size:26px;color:var(--dark);}
.section{background:var(--card);border:1.5px solid var(--border);border-radius:12px;padding:22px;margin-bottom:20px;}
.section-title{font-family:'Playfair Display',serif;font-size:16px;color:var(--dark);margin-bottom:16px;}
.client-row{display:grid;grid-template-columns:2fr 1fr 1fr 1fr 1fr;gap:12px;align-items:center;padding:12px 0;border-bottom:1px solid var(--border);font-size:13px;}
.client-row:last-child{border:none;}
.client-row.header-row{font-family:'IBM Plex Mono',monospace;font-size:8.5px;letter-spacing:0.08em;text-transform:uppercase;color:var(--muted);padding-bottom:8px;}
.status-badge{display:inline-block;padding:2px 8px;border-radius:4px;font-family:'IBM Plex Mono',monospace;font-size:8px;letter-spacing:0.06em;}
.status-badge.active{background:var(--green-bg);color:var(--green);}
.status-badge.pending{background:var(--amber-bg);color:var(--amber);}
.status-badge.cancelled{background:var(--red-bg);color:var(--red);}
.status-badge.pilot{background:rgba(184,134,11,0.1);color:var(--gold);}
.btn-sm{padding:5px 12px;border-radius:6px;border:1px solid var(--border);background:#fff;font-family:'IBM Plex Mono',monospace;font-size:8.5px;cursor:pointer;color:var(--muted);transition:all 0.15s;}
.btn-sm:hover{border-color:var(--gold);color:var(--gold);}
.btn-sm.danger:hover{border-color:var(--red);color:var(--red);}
.auth-screen{max-width:360px;margin:120px auto;text-align:center;}
.auth-screen input{width:100%;padding:11px 13px;border:1.5px solid var(--border);border-radius:8px;font-family:'IBM Plex Mono',monospace;font-size:12px;margin-bottom:12px;outline:none;}
.auth-screen input:focus{border-color:var(--gold);}
.btn-gold{width:100%;padding:12px;border-radius:8px;border:none;background:var(--gold);font-family:'IBM Plex Mono',monospace;font-size:11px;color:#fff;cursor:pointer;letter-spacing:0.1em;}
.spinner{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,0.4);border-top-color:#fff;border-radius:50%;animation:spin 0.7s linear infinite;vertical-align:middle;margin-right:6px;}
@keyframes spin{to{transform:rotate(360deg);}}
.alert{border-radius:8px;padding:10px 14px;margin-bottom:16px;font-size:12.5px;display:none;}
.alert.show{display:block;}
.alert.error{background:var(--red-bg);color:var(--red);}
.alert.success{background:var(--green-bg);color:var(--green);}
@media(max-width:700px){.stats-row{grid-template-columns:1fr 1fr;}.client-row{grid-template-columns:1fr;gap:4px;}}
</style>
</head>
<body>

<!-- AUTH GATE -->
<div id="auth_gate" style="display:none">
  <div class="header"><div><div class="logo"><em>Prime</em>IQ <span class="badge">ADMIN</span></div></div></div>
  <div class="auth-screen">
    <div style="font-family:'Playfair Display',serif;font-size:22px;margin-bottom:20px">Admin Access</div>
    <input type="password" id="admin_token_input" placeholder="Admin token" onkeydown="if(event.key==='Enter')checkAdminAuth()">
    <button class="btn-gold" onclick="checkAdminAuth()">Enter →</button>
    <div id="auth_error" style="font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--red);margin-top:10px;display:none">Invalid token</div>
  </div>
</div>

<!-- MAIN ADMIN UI -->
<div id="admin_ui" style="display:none">
  <div class="header">
    <div style="display:flex;align-items:center;gap:16px">
      <div class="logo"><em>Prime</em>IQ <span class="badge">ADMIN</span></div>
      <div style="font-family:'IBM Plex Mono',monospace;font-size:9px;color:rgba(255,255,255,0.3)" id="last_refreshed"></div>
    </div>
    <div style="display:flex;gap:12px">
      <button onclick="loadData()" style="font-family:'IBM Plex Mono',monospace;font-size:9px;color:rgba(255,255,255,0.5);background:none;border:1px solid rgba(255,255,255,0.1);border-radius:6px;padding:5px 12px;cursor:pointer;">Refresh</button>
      <button onclick="adminSignOut()" style="font-family:'IBM Plex Mono',monospace;font-size:9px;color:rgba(255,255,255,0.4);background:none;border:none;cursor:pointer;">Sign Out</button>
    </div>
  </div>

  <div class="main">
    <div id="admin_alert" class="alert"></div>

    <!-- STATS -->
    <div class="stats-row">
      <div class="stat"><div class="stat-label">Total Clients</div><div class="stat-val" id="stat_total">—</div></div>
      <div class="stat"><div class="stat-label">Active (Paying)</div><div class="stat-val" id="stat_active" style="color:var(--green)">—</div></div>
      <div class="stat"><div class="stat-label">Pilot</div><div class="stat-val" id="stat_pilot" style="color:var(--gold)">—</div></div>
      <div class="stat"><div class="stat-label">Pending Setup</div><div class="stat-val" id="stat_pending" style="color:var(--amber)">—</div></div>
    </div>

    <!-- CLIENTS TABLE -->
    <div class="section">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
        <div class="section-title" style="margin:0">All Clients</div>
        <input type="text" id="search_input" placeholder="Search..." oninput="filterClients()" style="padding:7px 12px;border:1.5px solid var(--border);border-radius:7px;font-family:'IBM Plex Mono',monospace;font-size:10px;outline:none;width:180px;">
      </div>
      <div class="client-row header-row">
        <div>Client</div>
        <div>Status</div>
        <div>Locations</div>
        <div>Last Active</div>
        <div>Actions</div>
      </div>
      <div id="clients_list">
        <div style="text-align:center;padding:32px;font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--muted)">Loading...</div>
      </div>
    </div>

    <!-- RECENT ACTIVITY -->
    <div class="section">
      <div class="section-title">Recent Signups (Last 7 Days)</div>
      <div id="recent_list">
        <div style="text-align:center;padding:20px;font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--muted)">Loading...</div>
      </div>
    </div>

  </div>
</div>

<script>
const API = 'https://restaurant-api-68re.onrender.com';
var adminToken = sessionStorage.getItem('primeiq_admin_token') || '';
var allClients = [];

function checkAdminAuth() {
  var input = document.getElementById('admin_token_input').value.trim();
  if (!input) return;
  // Store and try to load data — if API rejects we show error
  adminToken = input;
  sessionStorage.setItem('primeiq_admin_token', adminToken);
  loadData();
}

function adminSignOut() {
  sessionStorage.removeItem('primeiq_admin_token');
  adminToken = '';
  document.getElementById('admin_ui').style.display = 'none';
  document.getElementById('auth_gate').style.display = 'block';
  document.getElementById('admin_token_input').value = '';
}

async function adminFetch(path, method, body) {
  var ctrl = new AbortController();
  var timer = setTimeout(function(){ ctrl.abort(); }, 15000);
  try {
    var opts = { method: method||'GET', headers: { 'Content-Type':'application/json', 'X-Admin-Token': adminToken }, signal: ctrl.signal };
    if (body) opts.body = JSON.stringify(body);
    var res = await fetch(API + path, opts);
    clearTimeout(timer);
    if (res.status === 403) throw new Error('UNAUTHORIZED');
    var data = await res.json();
    if (!res.ok) throw new Error(data.detail || 'Request failed');
    return data;
  } catch(e) {
    clearTimeout(timer);
    throw e;
  }
}

async function loadData() {
  try {
    var data = await adminFetch('/admin/clients');
    allClients = data.clients || [];

    // Stats
    document.getElementById('stat_total').textContent = allClients.length;
    document.getElementById('stat_active').textContent = allClients.filter(function(c){ return c.status === 'active' && !c.is_pilot; }).length;
    document.getElementById('stat_pilot').textContent = allClients.filter(function(c){ return c.is_pilot; }).length;
    document.getElementById('stat_pending').textContent = allClients.filter(function(c){ return !c.setup_complete; }).length;
    document.getElementById('last_refreshed').textContent = 'Updated ' + new Date().toLocaleTimeString();

    renderClients(allClients);

    // Recent signups
    var sevenDaysAgo = new Date(Date.now() - 7*24*60*60*1000);
    var recent = allClients.filter(function(c){ return c.created_at && new Date(c.created_at) > sevenDaysAgo; });
    recent.sort(function(a,b){ return new Date(b.created_at) - new Date(a.created_at); });
    document.getElementById('recent_list').innerHTML = recent.length === 0
      ? '<div style="font-family:IBM Plex Mono,monospace;font-size:10px;color:var(--muted);padding:16px">No signups in the last 7 days</div>'
      : recent.map(function(c){ return '<div class="client-row"><div><strong>'+escHtml(c.name||'—')+'</strong><br><span style="font-family:IBM Plex Mono,monospace;font-size:9px;color:var(--muted)">'+escHtml(c.email||'')+'</span></div><div>'+statusBadge(c)+'</div><div style="font-family:IBM Plex Mono,monospace;font-size:9px;color:var(--muted)">'+(c.locations?c.locations.filter(function(l){return l.is_active;}).length+' locations':'—')+'</div><div style="font-family:IBM Plex Mono,monospace;font-size:9px;color:var(--muted)">'+fmtDate(c.created_at)+'</div><div>'+actionBtns(c)+'</div></div>'; }).join('');

    // Show UI
    document.getElementById('auth_gate').style.display = 'none';
    document.getElementById('admin_ui').style.display = 'block';

  } catch(e) {
    if (e.message === 'UNAUTHORIZED') {
      document.getElementById('auth_gate').style.display = 'block';
      document.getElementById('admin_ui').style.display = 'none';
      document.getElementById('auth_error').style.display = 'block';
    } else {
      document.getElementById('admin_alert') && (document.getElementById('admin_alert').className='alert show error') && (document.getElementById('admin_alert').textContent='Failed to load: '+e.message);
    }
  }
}

function renderClients(clients) {
  if (!clients.length) { document.getElementById('clients_list').innerHTML = '<div style="font-family:IBM Plex Mono,monospace;font-size:10px;color:var(--muted);padding:20px;text-align:center">No clients found</div>'; return; }
  document.getElementById('clients_list').innerHTML = clients.map(function(c){
    return '<div class="client-row">'+
      '<div><strong>'+escHtml(c.name||'—')+'</strong><br><span style="font-family:IBM Plex Mono,monospace;font-size:9px;color:var(--muted)">'+escHtml(c.email||'')+'</span></div>'+
      '<div>'+statusBadge(c)+'</div>'+
      '<div style="font-family:IBM Plex Mono,monospace;font-size:10px;color:var(--muted)">'+(c.locations?c.locations.filter(function(l){return l.is_active;}).length:'—')+'</div>'+
      '<div style="font-family:IBM Plex Mono,monospace;font-size:9px;color:var(--muted)">'+fmtDate(c.last_active_at||c.created_at)+'</div>'+
      '<div>'+actionBtns(c)+'</div>'+
    '</div>';
  }).join('');
}

function filterClients() {
  var q = document.getElementById('search_input').value.toLowerCase();
  renderClients(allClients.filter(function(c){
    return (c.name||'').toLowerCase().includes(q) || (c.email||'').toLowerCase().includes(q);
  }));
}

function statusBadge(c) {
  if (c.is_pilot) return '<span class="status-badge pilot">Pilot</span>';
  if (!c.setup_complete) return '<span class="status-badge pending">Onboarding</span>';
  var s = c.status || 'active';
  return '<span class="status-badge '+s+'">'+s.charAt(0).toUpperCase()+s.slice(1)+'</span>';
}

function actionBtns(c) {
  return '<div style="display:flex;gap:6px;flex-wrap:wrap">'+
    '<button class="btn-sm" onclick="triggerSync(\''+c.id+'\')">Sync</button>'+
    '<button class="btn-sm" onclick="togglePilot(\''+c.id+'\','+!!c.is_pilot+')">'+(c.is_pilot?'Remove Pilot':'Make Pilot')+'</button>'+
    '</div>';
}

async function triggerSync(clientId) {
  try {
    await adminFetch('/admin/client/'+clientId+'/sync', 'POST');
    alert('Sync triggered');
  } catch(e) { alert('Error: '+e.message); }
}

async function togglePilot(clientId, isPilot) {
  var newPilot = !isPilot;
  if (!confirm((newPilot ? 'Make this client a pilot (free access)?' : 'Remove pilot status?'))) return;
  try {
    await adminFetch('/admin/client/'+clientId+'/pilot', 'PUT', { is_pilot: newPilot });
    loadData();
  } catch(e) { alert('Error: '+e.message); }
}

function fmtDate(d) {
  if (!d) return '—';
  try {
    var dt = new Date(d);
    var diff = Math.floor((Date.now()-dt)/86400000);
    if (diff === 0) return 'Today';
    if (diff === 1) return 'Yesterday';
    if (diff < 7) return diff+'d ago';
    return dt.toLocaleDateString('en-US',{month:'short',day:'numeric'});
  } catch(e) { return '—'; }
}

function escHtml(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// Init
if (adminToken) {
  loadData();
} else {
  document.getElementById('auth_gate').style.display = 'block';
}
</script>
</body>
</html>
