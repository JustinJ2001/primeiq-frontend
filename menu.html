<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Menu Performance — PrimeIQ</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📊</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=IBM+Plex+Mono:wght@300;400;500&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<script>(function(){var t=localStorage.getItem('rd_token'),c=localStorage.getItem('rd_client_id');if(!t||!c)window.location.replace('/login');})()</script>
<style>
:root{--gold:#b8860b;--dark:#1a1208;--green:#2d7a4f;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Lato',sans-serif;background:var(--dark);color:#f5ead6;min-height:100vh;}
.header{background:var(--dark);padding:16px 32px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(255,255,255,0.06);}
.logo{font-family:'Playfair Display',serif;font-size:18px;color:#e8b84b;}
.logo em{font-style:italic;}
.nav a{font-family:'IBM Plex Mono',monospace;font-size:9px;color:rgba(255,255,255,0.4);text-decoration:none;margin-left:16px;}
.nav a:hover{color:#e8b84b;}
.main{max-width:960px;margin:0 auto;padding:32px 20px 80px;}
.page-title{font-family:'Playfair Display',serif;font-size:28px;color:#f5ead6;margin-bottom:4px;}
.page-sub{font-family:'IBM Plex Mono',monospace;font-size:9px;color:rgba(255,255,255,0.3);margin-bottom:24px;}
.period-row{display:flex;gap:8px;margin-bottom:20px;}
.period-btn{padding:7px 14px;border-radius:6px;border:1px solid rgba(255,255,255,0.1);background:transparent;font-family:'IBM Plex Mono',monospace;font-size:9px;color:rgba(255,255,255,0.4);cursor:pointer;}
.period-btn.active{background:rgba(184,134,11,0.15);border-color:var(--gold);color:var(--gold);}
.card{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:12px;padding:24px;margin-bottom:16px;}
.card-title{font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:0.12em;text-transform:uppercase;color:rgba(255,255,255,0.3);margin-bottom:16px;}
table{width:100%;border-collapse:collapse;}
th{font-family:'IBM Plex Mono',monospace;font-size:8px;letter-spacing:0.1em;text-transform:uppercase;color:rgba(255,255,255,0.3);text-align:left;padding:8px 12px;border-bottom:1px solid rgba(255,255,255,0.06);}
td{padding:10px 12px;border-bottom:1px solid rgba(255,255,255,0.04);font-size:13px;color:rgba(255,255,255,0.8);}
tr:last-child td{border:none;}
.bar-inline{height:4px;border-radius:2px;background:rgba(184,134,11,0.8);display:inline-block;vertical-align:middle;margin-left:8px;}
.rank-num{font-family:'IBM Plex Mono',monospace;font-size:10px;color:rgba(255,255,255,0.2);width:24px;display:inline-block;}
</style>
</head>
<body>
<div class="header">
  <div><div class="logo"><em>Prime</em>IQ</div></div>
  <div class="nav"><a href="/dashboard">← Dashboard</a><a href="/settings">Settings</a></div>
</div>
<div class="main">
  <div class="page-title">Menu Performance</div>
  <div class="page-sub">Best and worst performing items by revenue and quantity</div>

  <div class="period-row">
    <button class="period-btn active" onclick="setPeriod('week',this)">This Week</button>
    <button class="period-btn" onclick="setPeriod('month',this)">This Month</button>
    <button class="period-btn" onclick="setPeriod('quarter',this)">This Quarter</button>
  </div>

  <div class="card">
    <div class="card-title">Top Items by Revenue</div>
    <table>
      <thead><tr><th>#</th><th>Item</th><th>Category</th><th>Qty Sold</th><th>Revenue</th><th>Avg Price</th><th>% of Orders</th></tr></thead>
      <tbody id="menu_table"><tr><td colspan="7" style="text-align:center;color:rgba(255,255,255,0.2);padding:32px;">Loading...</td></tr></tbody>
    </table>
  </div>

  <div class="card">
    <div class="card-title">Top Items by Volume</div>
    <table>
      <thead><tr><th>#</th><th>Item</th><th>Qty Sold</th><th>Revenue</th><th>Popularity</th></tr></thead>
      <tbody id="volume_table"><tr><td colspan="5" style="text-align:center;color:rgba(255,255,255,0.2);padding:24px;">Loading...</td></tr></tbody>
    </table>
  </div>
</div>

<script>
const API = 'https://restaurant-api-68re.onrender.com';
function lsGet(k){ try{ var v=localStorage.getItem(k); return(!v||v==='undefined'||v==='null')?null:v; }catch(e){return null;} }
function fu(n){ return '$'+Math.round(n||0).toLocaleString(); }
function fp(n){ return (n||0).toFixed(1)+'%'; }
var currentPeriod = 'week';

function setPeriod(p, btn) {
  currentPeriod = p;
  document.querySelectorAll('.period-btn').forEach(function(b){ b.classList.remove('active'); });
  btn.classList.add('active');
  loadData();
}

async function loadData() {
  var token = lsGet('rd_token');
  try {
    var res = await fetch(API + '/api/menu?period=' + currentPeriod, { headers: { 'Authorization': 'Bearer ' + token } });
    var data = await res.json();
    var items = data.items || [];

    if (items.length === 0) {
      var msg = '<tr><td colspan="7" style="text-align:center;color:rgba(255,255,255,0.2);padding:24px;">No menu data available — connect your POS to see item performance</td></tr>';
      document.getElementById('menu_table').innerHTML = msg;
      document.getElementById('volume_table').innerHTML = '<tr><td colspan="5" style="text-align:center;color:rgba(255,255,255,0.2);padding:24px;">No data</td></tr>';
      return;
    }

    var maxRev = items[0].gross_revenue || 1;
    document.getElementById('menu_table').innerHTML = items.slice(0,20).map(function(item, i){
      var barWidth = Math.round(item.gross_revenue / maxRev * 80);
      return '<tr><td><span class="rank-num">' + (i+1) + '</span></td><td><strong>' + item.item_name + '</strong></td><td style="color:rgba(255,255,255,0.4)">' + (item.category||'—') + '</td><td>' + (item.quantity_sold||0).toLocaleString() + '</td><td>' + fu(item.gross_revenue) + '<span class="bar-inline" style="width:'+barWidth+'px"></span></td><td>' + fu(item.avg_price) + '</td><td>' + fp(item.pct_of_orders) + '</td></tr>';
    }).join('');

    var byVolume = items.slice().sort(function(a,b){ return (b.quantity_sold||0)-(a.quantity_sold||0); });
    var maxQty = byVolume[0] ? byVolume[0].quantity_sold : 1;
    document.getElementById('volume_table').innerHTML = byVolume.slice(0,10).map(function(item, i){
      var barWidth = Math.round((item.quantity_sold||0) / maxQty * 100);
      return '<tr><td><span class="rank-num">' + (i+1) + '</span></td><td><strong>' + item.item_name + '</strong></td><td>' + (item.quantity_sold||0).toLocaleString() + '</td><td>' + fu(item.gross_revenue) + '</td><td><div style="height:4px;border-radius:2px;background:rgba(184,134,11,0.8);width:'+barWidth+'px;max-width:120px;"></div></td></tr>';
    }).join('');

  } catch(e) {
    document.getElementById('menu_table').innerHTML = '<tr><td colspan="7" style="text-align:center;color:rgba(255,255,255,0.2);padding:24px;">Failed to load — ' + e.message + '</td></tr>';
  }
}
loadData();
</script>
</body>
</html>
