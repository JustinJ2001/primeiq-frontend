<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Page Not Found — PrimeIQ</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📊</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=IBM+Plex+Mono:wght@300;400;500&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Lato',sans-serif;background:#1a1208;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;text-align:center;}
.logo{font-family:'Playfair Display',serif;font-size:22px;color:#e8b84b;margin-bottom:40px;}
.logo em{font-style:italic;color:#f5ead6;}
.code{font-family:'IBM Plex Mono',monospace;font-size:72px;color:rgba(255,255,255,0.08);margin-bottom:16px;}
h1{font-family:'Playfair Display',serif;font-size:26px;color:#f5ead6;margin-bottom:10px;}
p{font-family:'IBM Plex Mono',monospace;font-size:10px;color:rgba(255,255,255,0.3);margin-bottom:32px;letter-spacing:0.06em;}
.links{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;}
.links a{padding:11px 22px;border-radius:8px;font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:0.08em;text-decoration:none;}
.links a.primary{background:#b8860b;color:#fff;}
.links a.secondary{border:1px solid rgba(255,255,255,0.1);color:rgba(255,255,255,0.5);}
</style>
</head>
<body>
<div class="logo"><em>Prime</em>IQ</div>
<div class="code">404</div>
<h1>Page not found</h1>
<p>This page doesn't exist or was moved.</p>
<div class="links">
  <a href="/dashboard" class="primary">Go to Dashboard →</a>
  <a href="/login" class="secondary">Sign In</a>
</div>
<script>
// Page view tracking
(function() {
  try {
    var clientId = (function(k){ try{ var v=localStorage.getItem(k); return(!v||v==='undefined'||v==='null')?null:v; }catch(e){return null;} })('rd_client_id');
    fetch('https://restaurant-api-68re.onrender.com/api/usage/ping', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ client_id: clientId || 'anonymous', page: window.location.pathname })
    }).catch(function(){});
  } catch(e) {}
})();
</script>
</body>
</html>
